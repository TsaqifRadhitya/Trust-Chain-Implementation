worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    sendfile        on;
    keepalive_timeout  65;

    upstream backend {
        server backend:8080;
    }

    upstream frontend_app {
        server frontend:80;
    }

    server {
        listen 8080;
        server_name localhost;

        # Internal Auth Validator (digunakan oleh auth_request)
        location = /auth/validate {
            internal;
            proxy_pass http://backend/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Block external access to internal routes explicitly
        location /api/v1/internal/ {
            deny all;
            return 404;
        }

        # Auth Service Routes (Public)
        location /api/v1/auth/ {
            proxy_pass http://backend/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Setting Service Routes (Protected)
        location /api/v1/settings {
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;

            proxy_pass http://backend/api/v1/settings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Teruskan X-User-Id ke downstream backend
            proxy_set_header X-User-Id $user_id;
        }
    }

    # Frontend Server (Production Build)
    server {
        listen 8000;
        server_name localhost;

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
