name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Build
        run: npm run build

  auth-service-ci:
    name: Auth Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/auth_service
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: './backend/auth_service/go.sum'
          
      - name: Install dependencies
        run: go mod download
        
      - name: Build
        run: go build -v ./...
        
      - name: Test
        run: go test -v ./... || echo "No tests found or tests failed"

  model-service-ci:
    name: Model Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/model_service
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt

  docker-build:
    name: Docker Build Validation
    needs: [frontend-ci, auth-service-ci, model-service-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: trustchain-frontend:latest
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080/api/v1
            
      - name: Build Auth Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth_service
          push: false
          tags: trustchain-auth-service:latest
          
      - name: Build Model Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/model_service
          push: false
          tags: trustchain-model-service:latest

  deploy:
    name: Deploy to VPS
    needs: [frontend-ci, auth-service-ci, model-service-ci, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            
            cd /var/www/Trust-Chain-Implementation
            
            # Ambil update kode terbaru
            git pull origin main
            
            # Hentikan container lama yang mungkin masih menyangkut
            docker-compose down
            
            # Rebuild dan jalankan docker container di background
            docker-compose up -d --build
            
            # Hapus image yang tidak terpakai (dangling) agar hemat storage
            docker image prune -f
