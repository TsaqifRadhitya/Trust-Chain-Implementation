
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - model_service

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api/v1
  backend:
    build:
      context: ./backend/auth_service
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=auth_service
      - DB_SSLMODE=disable
      - JWT_SECRET=my-super-secret-key-12345
      - JWT_REFRESH_SECRET=my-super-secret-refresh-key-67890
    depends_on:
      - db

  model_service:
    build:
      context: ./backend/model_service
    environment:
      - PORT=8000
    ports:
      - "8001:8000"
        
    volumes:
      - ./backend/model_service:/app
      
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  dummy_api:
    build:
      context: ./backend/dummy_api
    ports:
      - "8082:8080"

volumes:
  pgdata:
